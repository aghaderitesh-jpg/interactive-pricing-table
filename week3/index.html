<!DOCTYPE html>
<html>
<head>
    <title>Pricing Table</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="pricing-container">

        <div class="pricing-card">
            <h2>Basic</h2>
            <p class="price">₹499</p>
            <p>1 Website</p>
            <p>Basic Support</p>
            <button>Choose Plan</button>
        </div>

        <div class="pricing-card">
            <h2>Standard</h2>
            <p class="price">₹999</p>
            <p>5 Websites</p>
            <p>Priority Support</p>
            <button>Choose Plan</button>
        </div>

        <div class="pricing-card">
            <h2>Premium</h2>
            <p class="price">₹1499</p>
            <p>Unlimited Websites</p>
            <p>24/7 Support</p>
            <button>Choose Plan</button>
        </div>

    </div>

</body>
</html>
