<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Table</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="title">Pricing Plans</h1>

    <div class="container">

        <div class="card">
            <h2>Basic</h2>
            <h3>$10/month</h3>

            <ul>
                <li>10GB Storage</li>
                <li>Email Support</li>
                <li>1 User</li>
            </ul>

            <button>Choose Plan</button>
        </div>

        <div class="card">
            <h2>Standard</h2>
            <h3>$20/month</h3>

            <ul>
                <li>50GB Storage</li>
                <li>Chat Support</li>
                <li>5 Users</li>
            </ul>

            <button>Choose Plan</button>
        </div>

        <div class="card">
            <h2>Premium</h2>
            <h3>$30/month</h3>

            <ul>
                <li>100GB Storage</li>
                <li>24/7 Support</li>
                <li>Unlimited Users</li>
            </ul>

            <button>Choose Plan</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
